name: Full Validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-quality-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libayatana-appindicator3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --manifest-path rust/Cargo.toml --all --check

      - name: Run clippy
        run: cargo clippy --manifest-path rust/Cargo.toml --all-targets --target x86_64-unknown-linux-gnu -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path rust/Cargo.toml --target x86_64-unknown-linux-gnu

      - name: Run Tauri clippy
        run: cargo clippy --manifest-path apps/desktop-tauri/src-tauri/Cargo.toml --all-targets --target x86_64-unknown-linux-gnu -- -D warnings

      - name: Run Tauri tests
        run: cargo test --manifest-path apps/desktop-tauri/src-tauri/Cargo.toml --target x86_64-unknown-linux-gnu

  frontend-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop-tauri/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix apps/desktop-tauri --prefer-offline --no-audit --no-fund

      - name: Run frontend tests
        run: npm --prefix apps/desktop-tauri test

      - name: Build frontend
        run: npm --prefix apps/desktop-tauri run build

  windows-build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Run clippy
        shell: bash
        run: cargo clippy --manifest-path rust/Cargo.toml --all-targets --target x86_64-pc-windows-msvc -- -D warnings

      - name: Run tests
        shell: bash
        run: cargo test --manifest-path rust/Cargo.toml --target x86_64-pc-windows-msvc

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build \
            --manifest-path rust/Cargo.toml \
            --release \
            --target x86_64-pc-windows-msvc \
            --bin codexbar

      - name: Smoke test Windows CLI
        shell: pwsh
        run: |
          $exe = Resolve-Path "target\x86_64-pc-windows-msvc\release\codexbar.exe"
          $output = (& $exe --version 2>&1 | Out-String).Trim()

          if ($LASTEXITCODE -ne 0) {
            throw "codexbar.exe --version exited with code $LASTEXITCODE"
          }

          Write-Host $output

          if ([string]::IsNullOrWhiteSpace($output)) {
            throw "codexbar.exe --version produced no output"
          }

  linux-cli-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runs-on: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            arch: x86_64
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            arch: aarch64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libayatana-appindicator3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build Linux CLI
        run: cargo build --manifest-path rust/Cargo.toml --release --target ${{ matrix.target }} --bin codexbar

      - name: Smoke test CLI
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/codexbar"
          "$BIN" --help >/dev/null
          "$BIN" --version >/dev/null
          "$BIN" usage --help >/dev/null
