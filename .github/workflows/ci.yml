name: CI

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "extra-docs/**"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "extra-docs/**"
      - "LICENSE"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend build and tests
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop-tauri/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix apps/desktop-tauri --prefer-offline --no-audit --no-fund

      - name: Run frontend tests
        run: npm --prefix apps/desktop-tauri test

      - name: Build frontend
        run: npm --prefix apps/desktop-tauri run build

  rust-format:
    name: Rust formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust formatter
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --manifest-path rust/Cargo.toml --all --check
