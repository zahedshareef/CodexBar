name: Release Windows App

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-app:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Read app version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' rust/Cargo.toml | head -n 1)"
          if [[ -z "$VERSION" ]]; then
            echo "Failed to determine app version from rust/Cargo.toml" >&2
            exit 1
          fi
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build release assets
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        run: |
          $signArgs = @()
          if ($env:WINDOWS_SIGNING_CERT_BASE64) {
            $certPath = Join-Path $env:RUNNER_TEMP "codexbar-signing.pfx"
            [System.IO.File]::WriteAllBytes(
              $certPath,
              [System.Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_BASE64)
            )
            $signArgs += @("-SigningCertPath", $certPath, "-RequireSigning")
          }

          $releaseArgs = @(
            "-ExecutionPolicy",
            "Bypass",
            "-File",
            ".\scripts\build-windows-release-assets.ps1"
          ) + $signArgs

          & powershell @releaseArgs

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$GITHUB_REF_NAME" \
            "rust/target/release-assets/CodexBar-$APP_VERSION-Setup.exe" \
            "rust/target/release-assets/CodexBar-$APP_VERSION-Setup.exe.sha256" \
            "rust/target/release-assets/CodexBar-$APP_VERSION-portable.exe" \
            "rust/target/release-assets/CodexBar-$APP_VERSION-portable.exe.sha256" \
            --clobber

      - name: Upload workflow artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v6
        with:
          name: codexbar-windows-release-assets
          path: |
            rust/target/release-assets/CodexBar-${{ env.APP_VERSION }}-Setup.exe
            rust/target/release-assets/CodexBar-${{ env.APP_VERSION }}-Setup.exe.sha256
            rust/target/release-assets/CodexBar-${{ env.APP_VERSION }}-portable.exe
            rust/target/release-assets/CodexBar-${{ env.APP_VERSION }}-portable.exe.sha256
