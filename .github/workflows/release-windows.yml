name: Release Windows App

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-app:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop-tauri/package-lock.json

      - name: Read app version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' rust/Cargo.toml | head -n 1)"
          if [[ -z "$VERSION" ]]; then
            echo "Failed to determine app version from rust/Cargo.toml" >&2
            exit 1
          fi
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        shell: bash
        run: npm ci --prefix apps/desktop-tauri

      - name: Build Windows executable
        shell: bash
        run: |
          set -euo pipefail
          pushd apps/desktop-tauri
          npx tauri build --no-bundle
          popd

          SOURCE_EXE="target/release/codexbar-desktop-tauri.exe"
          DEST_EXE="target/release/codexbar.exe"

          if [[ ! -f "$SOURCE_EXE" ]]; then
            echo "Missing expected Tauri binary: $SOURCE_EXE" >&2
            exit 1
          fi

          cp "$SOURCE_EXE" "$DEST_EXE"

          WEBVIEW2_DLL="target/release/WebView2Loader.dll"
          if [[ ! -f "$WEBVIEW2_DLL" ]]; then
            mapfile -t WEBVIEW2_CANDIDATES < <(find target/release/build -path '*/out/x64/WebView2Loader.dll' -type f)
            if [[ "${#WEBVIEW2_CANDIDATES[@]}" -gt 0 ]]; then
              cp "${WEBVIEW2_CANDIDATES[0]}" "$WEBVIEW2_DLL"
            fi
          fi

          if [[ ! -f "$WEBVIEW2_DLL" ]]; then
            echo "Missing expected WebView2 runtime sidecar: $WEBVIEW2_DLL" >&2
            echo "The installer and portable package must ship WebView2Loader.dll beside codexbar.exe." >&2
            exit 1
          fi

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Download installer dependencies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force rust\target\installer-deps | Out-Null
          $vcRedistPath = "rust\target\installer-deps\vc_redist.x64.exe"
          $webView2BootstrapperPath = "rust\target\installer-deps\MicrosoftEdgeWebview2Setup.exe"
          Invoke-WebRequest `
            -Uri "https://aka.ms/vc14/vc_redist.x64.exe" `
            -OutFile $vcRedistPath
          Invoke-WebRequest `
            -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" `
            -OutFile $webView2BootstrapperPath

          foreach ($dependency in @($vcRedistPath, $webView2BootstrapperPath)) {
            $signature = Get-AuthenticodeSignature -FilePath $dependency
            if ($signature.Status -ne 'Valid') {
              throw "$dependency signature is not valid. Status: $($signature.Status)"
            }

            $subject = $signature.SignerCertificate.Subject
            if ($subject -notlike '*Microsoft Corporation*') {
              throw "$dependency signer is unexpected: $subject"
            }
          }

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force rust\target\installer | Out-Null
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "Inno Setup compiler not found at $iscc"
          }

          Push-Location rust\installer
          try {
            & $iscc `
              /Qp `
              "/DAppVersion=$env:APP_VERSION" `
              "/DTargetBinDir=..\..\target\release" `
              "/DVCRedistPath=..\target\installer-deps\vc_redist.x64.exe" `
              "/DWebView2BootstrapperPath=..\target\installer-deps\MicrosoftEdgeWebview2Setup.exe" `
              "/DOutputDir=..\target\installer" `
              "/DOutputBaseFilename=CodexBar-$env:APP_VERSION-Setup" `
              codexbar.iss
          } finally {
            Pop-Location
          }

      - name: Prepare release assets
        shell: pwsh
        run: |
          $assetDir = "rust\target\release-assets"
          New-Item -ItemType Directory -Force $assetDir | Out-Null

          $webview2 = "target\release\WebView2Loader.dll"
          $installer = "rust\target\installer\CodexBar-$env:APP_VERSION-Setup.exe"
          $portableDir = "rust\target\portable\CodexBar-$env:APP_VERSION-portable"
          $portableZip = Join-Path $assetDir "CodexBar-$env:APP_VERSION-portable.zip"

          foreach ($path in @("target\release\codexbar.exe", $webview2, $installer)) {
            if (-not (Test-Path $path)) {
              throw "Missing expected asset: $path"
            }
          }

          New-Item -ItemType Directory -Force $portableDir | Out-Null
          Copy-Item "target\release\codexbar.exe" $portableDir -Force
          Copy-Item $webview2 $portableDir -Force
          Copy-Item "rust\icons\icon.ico" $portableDir -Force
          Compress-Archive -Path "$portableDir\*" -DestinationPath $portableZip -Force

          foreach ($path in @($installer, $portableZip)) {
            $fileName = Split-Path $path -Leaf
            $destPath = Join-Path $assetDir $fileName
            if ((Resolve-Path $path).Path -ne (Resolve-Path $destPath -ErrorAction SilentlyContinue).Path) {
              Copy-Item $path $assetDir -Force
            }

            $hash = (Get-FileHash -Algorithm SHA256 $destPath).Hash.ToLower()
            "$hash  $fileName" | Set-Content -Encoding ascii "$destPath.sha256"
          }

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$GITHUB_REF_NAME" \
            "rust/target/release-assets/CodexBar-$APP_VERSION-Setup.exe" \
            "rust/target/release-assets/CodexBar-$APP_VERSION-Setup.exe.sha256" \
            "rust/target/release-assets/CodexBar-$APP_VERSION-portable.zip" \
            "rust/target/release-assets/CodexBar-$APP_VERSION-portable.zip.sha256" \
            --clobber

      - name: Upload workflow artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v6
        with:
          name: codexbar-windows-release-assets
          path: |
            rust/target/release-assets/CodexBar-${{ env.APP_VERSION }}-Setup.exe
            rust/target/release-assets/CodexBar-${{ env.APP_VERSION }}-Setup.exe.sha256
            rust/target/release-assets/CodexBar-${{ env.APP_VERSION }}-portable.zip
            rust/target/release-assets/CodexBar-${{ env.APP_VERSION }}-portable.zip.sha256
